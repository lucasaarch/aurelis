syntax = "proto3";
package auth;

service AuthService {
    rpc GameLogin (GameLoginRequest) returns (GameLoginResponse);
    rpc RefreshGameToken (RefreshGameTokenRequest) returns (GameLoginResponse);
}

message GameLoginRequest {
    string email = 1;
    string password = 2;
}

message GameLoginResponse {
    string access_token = 1;
    string refresh_token = 2;
}

message RefreshGameTokenRequest {
    string refresh_token = 1;
}