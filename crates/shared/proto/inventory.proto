syntax = "proto3";
package inventory;

service InventoryService {
  rpc ListItems(ListItemsRequest) returns (ListItemsResponse);
  rpc MoveItem(MoveItemRequest) returns (MoveItemResponse);
  rpc DeleteItem(DeleteItemRequest) returns (DeleteItemResponse);
}

message ItemAttribute {
  string key = 1;
  string value = 2;
}

message ItemDetail {
  string id = 1;
  string name = 2;
  string description = 3;
  string icon = 4;
  string rarity = 5;
  int32 max_stack = 6;
  map<string, int32> base_stats = 7;
  repeated ItemAttribute attributes = 8;
}

message InventoryItem {
  string id = 1;
  string inventory_id = 2;
  optional string item_instance_id = 3;
  optional string item_id = 4;
  int32 slot_index = 5;
  int32 quantity = 6;
  string acquired_at = 7;
  optional ItemDetail item = 8;
}

message ListItemsRequest {
  string character_id = 1;
  string inventory_type = 2;
}

message ListItemsResponse {
  repeated InventoryItem items = 1;
}

message MoveItemRequest {
  string character_id = 1;
  string inventory_type = 2;
  int32 from_slot = 3;
  int32 to_slot = 4;
}

message MoveItemResponse {}

message DeleteItemRequest {
  string character_id = 1;
  string inventory_type = 2;
  int32 slot = 3;
}

message DeleteItemResponse {}
