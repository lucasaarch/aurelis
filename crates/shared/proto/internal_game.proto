syntax = "proto3";

package internal_game;

service InternalGameService {
  rpc LoadPlayableCharacter(LoadPlayableCharacterRequest) returns (LoadPlayableCharacterResponse);
  rpc PersistItemInstanceState(PersistItemInstanceStateRequest) returns (PersistItemInstanceStateResponse);
  rpc UnlockCharacterSkillTier(UnlockCharacterSkillTierRequest) returns (UnlockCharacterSkillTierResponse);
  rpc ConsumeInventoryItem(ConsumeInventoryItemRequest) returns (ConsumeInventoryItemResponse);
}

message LoadPlayableCharacterRequest {
  string account_id = 1;
  string character_id = 2;
}

message LoadPlayableCharacterResponse {
  string character_id = 1;
  string name = 2;
  string base_character_slug = 3;
  string current_class_slug = 4;
  int32 level = 5;
  string account_id = 6;
  int64 experience = 7;
  int64 credits = 8;
  bool beginner_skill_unlocked = 9;
  bool intermediate_skill_unlocked = 10;
  repeated PersistedInventorySnapshot inventories = 11;
  repeated PersistedEquipmentSnapshot equipment = 12;
  repeated PersistedItemInstanceSnapshot item_instances = 13;
}

message PersistedInventorySnapshot {
  string id = 1;
  string inventory_type = 2;
  int32 capacity = 3;
  repeated PersistedInventoryItemSnapshot items = 4;
}

message PersistedInventoryItemSnapshot {
  string id = 1;
  string inventory_id = 2;
  string inventory_type = 3;
  int32 slot_index = 4;
  int32 quantity = 5;
  optional string item_instance_id = 6;
  optional string item_id = 7;
  optional string item_slug = 8;
}

message PersistedEquipmentSnapshot {
  string slot = 1;
  string item_instance_id = 2;
}

message PersistedItemInstanceSnapshot {
  string id = 1;
  string item_id = 2;
  string item_slug = 3;
  string inventory_type = 4;
  int32 refinement = 5;
  int32 bonus_gem_slots = 6;
  string attributes_json = 7;
  bool in_shared_storage = 8;
  bool in_trade = 9;
  repeated PersistedItemInstanceGemSnapshot gems = 10;
}

message PersistedItemInstanceGemSnapshot {
  int32 slot_index = 1;
  string gem_instance_id = 2;
}

message PersistItemInstanceStateRequest {
  string account_id = 1;
  string character_id = 2;
  string item_instance_id = 3;
  int32 bonus_gem_slots = 4;
  string attributes_json = 5;
}

message PersistItemInstanceStateResponse {}

message UnlockCharacterSkillTierRequest {
  string account_id = 1;
  string character_id = 2;
  string tier = 3;
}

message UnlockCharacterSkillTierResponse {}

message ConsumeInventoryItemRequest {
  string account_id = 1;
  string character_id = 2;
  string inventory_type = 3;
  int32 slot = 4;
  int32 quantity = 5;
}

message ConsumeInventoryItemResponse {}
