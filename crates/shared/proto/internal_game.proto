syntax = "proto3";

package internal_game;

service InternalGameService {
  rpc GameLogin(GameLoginRequest) returns (GameLoginResponse);
  rpc ListCharacters(ListCharactersRequest) returns (ListCharactersResponse);
  rpc CreateCharacter(CreateCharacterRequest) returns (CreateCharacterResponse);
  rpc LoadPlayableCharacter(LoadPlayableCharacterRequest) returns (LoadPlayableCharacterResponse);
  rpc PersistItemInstanceState(PersistItemInstanceStateRequest) returns (PersistItemInstanceStateResponse);
  rpc UnlockCharacterSkillTier(UnlockCharacterSkillTierRequest) returns (UnlockCharacterSkillTierResponse);
  rpc ConsumeInventoryItem(ConsumeInventoryItemRequest) returns (ConsumeInventoryItemResponse);
  rpc EquipInventoryItem(EquipInventoryItemRequest) returns (EquipInventoryItemResponse);
  rpc UnequipItem(UnequipItemRequest) returns (UnequipItemResponse);
  rpc UpdateItemInstanceRefinement(UpdateItemInstanceRefinementRequest) returns (UpdateItemInstanceRefinementResponse);
  rpc SocketGem(SocketGemRequest) returns (SocketGemResponse);
}

message GameLoginRequest {
  string email = 1;
  string password = 2;
}

message GameLoginResponse {
  string account_id = 1;
}

message CharacterSummary {
  string id = 1;
  string name = 2;
  int32 level = 3;
  string class_slug = 4;
  string created_at = 5;
  string updated_at = 6;
}

message ListCharactersRequest {
  string account_id = 1;
}

message ListCharactersResponse {
  repeated CharacterSummary characters = 1;
}

message CreateCharacterRequest {
  string account_id = 1;
  string name = 2;
  string class_slug = 3;
}

message CreateCharacterResponse {
  CharacterSummary character = 1;
}

message LoadPlayableCharacterRequest {
  string account_id = 1;
  string character_id = 2;
}

message LoadPlayableCharacterResponse {
  string character_id = 1;
  string name = 2;
  string base_character_slug = 3;
  string current_class_slug = 4;
  int32 level = 5;
  string account_id = 6;
  int64 experience = 7;
  int64 credits = 8;
  bool beginner_skill_unlocked = 9;
  bool intermediate_skill_unlocked = 10;
  repeated PersistedInventorySnapshot inventories = 11;
  repeated PersistedEquipmentSnapshot equipment = 12;
  repeated PersistedItemInstanceSnapshot item_instances = 13;
}

message PersistedInventorySnapshot {
  string id = 1;
  string inventory_type = 2;
  int32 capacity = 3;
  repeated PersistedInventoryItemSnapshot items = 4;
}

message PersistedInventoryItemSnapshot {
  string id = 1;
  string inventory_id = 2;
  string inventory_type = 3;
  int32 slot_index = 4;
  int32 quantity = 5;
  optional string item_instance_id = 6;
  optional string item_id = 7;
  optional string item_slug = 8;
}

message PersistedEquipmentSnapshot {
  string slot = 1;
  string item_instance_id = 2;
}

message PersistedItemInstanceSnapshot {
  string id = 1;
  string item_id = 2;
  string item_slug = 3;
  string inventory_type = 4;
  int32 refinement = 5;
  int32 bonus_gem_slots = 6;
  string attributes_json = 7;
  bool in_shared_storage = 8;
  bool in_trade = 9;
  repeated PersistedItemInstanceGemSnapshot gems = 10;
}

message PersistedItemInstanceGemSnapshot {
  int32 slot_index = 1;
  string gem_instance_id = 2;
}

message PersistItemInstanceStateRequest {
  string account_id = 1;
  string character_id = 2;
  string item_instance_id = 3;
  int32 bonus_gem_slots = 4;
  string attributes_json = 5;
}

message PersistItemInstanceStateResponse {}

message UnlockCharacterSkillTierRequest {
  string account_id = 1;
  string character_id = 2;
  string tier = 3;
}

message UnlockCharacterSkillTierResponse {}

message ConsumeInventoryItemRequest {
  string account_id = 1;
  string character_id = 2;
  string inventory_type = 3;
  int32 slot = 4;
  int32 quantity = 5;
}

message ConsumeInventoryItemResponse {}

message EquipInventoryItemRequest {
  string account_id = 1;
  string character_id = 2;
  string inventory_type = 3;
  int32 slot = 4;
}

message EquipInventoryItemResponse {}

message UnequipItemRequest {
  string account_id = 1;
  string character_id = 2;
  string equipment_slot = 3;
}

message UnequipItemResponse {}

message UpdateItemInstanceRefinementRequest {
  string account_id = 1;
  string character_id = 2;
  string item_instance_id = 3;
  int32 refinement = 4;
}

message UpdateItemInstanceRefinementResponse {}

message SocketGemRequest {
  string account_id = 1;
  string character_id = 2;
  string equipment_slot = 3;
  string inventory_type = 4;
  int32 slot = 5;
  int32 socket_index = 6;
}

message SocketGemResponse {}
